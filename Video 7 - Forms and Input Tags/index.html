<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets learn it</title>
</head>
<link rel="stylesheet" href="style.css">

<body>
    <h1>Form to apply for Sigma Web Development Course - TA </h1>
    <form action="post">
        <div>
            <label for="username">Username:</label>
            <input type="text" name="username" placeholder="Enter your username" autofocus>
            <! -- autofocus attribute is used to automatically focus the input field when the page loads -- >
        </div>
        <! -- div is block element, used to group the related elements in a form and to format them with CSS -- >
            <div>
                <label for="gender">Gender:</label>
                <input type="radio" name="gender" id="male" value="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value="female">
                <label for="female">Female</label>
            </div>
            <div>
                <input type="checkbox" name="subscribe" id="subscribe" value="yes">
                <label for="subscribe">Subscribe to newsletter</label>
            </div>
            <div>
                <label for="comment">Comment:</label>
                <br>
                <!-- br tag is not recommended to use often -->
                <textarea name="comment" id="comment" cols="30" rows="5">Enter your comment here...</textarea>
            </div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
    </form>
</body>

</html>
