<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            background-color: aliceblue;
        }

        .container {
            /* align-content: center; */
            /* align-content tab use hoga jab multiple lines ho */
            /* flex-wrap: wrap; */
            /* flex-flow: row wrap-reverse; */
            /* column-gap: 60px; */
            border: 2px solid maroon;
            display: flex;
            /* justify-content: center; */
            /* horizontally centre ho jayenge */
            /* justify-content: flex-end; */
            /* end mein chala jayyega {right}; */
            /* flex start karenge toh start mein aa jayega (top) */
            /* baseline  */
            height: 80vh;
            align-items: flex-start;
            /* vertically centre ho jayenge */
            /* flex-direction: column-reverse; */
            /* flex-direction: row; */
            /* ⭐agar flex direction row hogi toh main axis horizontal hoga aur vertical cross axis ho jayegi
            ⭐aur agar column hoga toh column main axis ho jayega */

            /* gap: 30px; */
            /* column-gap: 60px; */
            /* row-gap: 15px; */
            /* gap: 15px 60px;  */


        }



        /* ⭐toh jo main axis hogi ussi ke hisaab se justify content centre karega⭐ */
        .item {
            /* flex-grow: 1; */
            /* isse har item sirf ek ki hi jagah lega aur saare items mein equally share karega */
            display: flex;
            justify-content: center;
            align-items: last baseline;
            height: 92px;
            width: 92px;
            background-color: rgb(182, 182, 247);
            border: 2px solid;
            margin: 4px;
            flex-shrink: 2;
            /* ability to shrink itself wrt screen size */


        }

        .item1 {
            /* flex-grow: 9; */
            /* isse jo item ki andr ki available space hai woh 9 times occupy karega */
            align-self: flex-end;
            /* align-content hatana padega nhi toh kaam nhi karega */
        }
        .item2{
            align-self: center;
        }

        .order-1 {
            order: 1;
        }

        .order-2 {
            order: 2;
        }

        .order-3 {
            order: 3;
        }
    </style>
</head>

<body>
    <main>
        <div class="container">

            <div class="item item1"></div>
            <div class="item"></div>
            <div class="item order-1"></div>
            <div class="item order-2"></div>
            <div class="item order-3"></div>
            <div class="item item2"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item order-1"></div>
        </div>
    </main>
</body>

</html>
