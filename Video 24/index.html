<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows and Outlines - CSS</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            box-shadow: 4px 5px 5px 1px #ab8190;
        }
        .text-element{
            text-shadow: 5px 2px 4px #c780ee;
        }
    </style>
</head>

<body>
    <div class="box">
        I am a box.
    </div>
    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusantium minima ullam totam praesentium maiores a tempore earum soluta voluptatem odio modi corrupti temporibus architecto minus sint, repudiandae ut? Voluptas, saepe.
    </p>
    <div><a href="https://www.codewithharry.com/tutorial/css-shadows">Shadows in CSS</a></div>
    <div>
        <iframe width="700" height="450" src="https://www.codewithharry.com/tutorial/css-shadows"
            frameborder="0">Shadows in CSS</iframe>
    </div>
</body>

</html>
