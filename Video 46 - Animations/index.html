<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <style>
        .container {
            background-color: rgb(209, 233, 254);
            width: 30vw;
            height: 80vh;
        }

        .box {
            width: 45px;
            height: 45px;
            /* background-color: rgb(136, 199, 255); */
            align-items: center;
            display: flex;
            justify-content: center;
            /* animation: YaminiKaAnimation;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.29, 0.8, 0.51, 0.96); */
            /*⭐ inspect me jakr animation timing function me jakr graph pr click karke customise */
            /* animation-delay: 1s; */
            /* animation-direction: reverse; */
            /* animation-direction: alternate-reverse; */
            /* animation-play-state: running; */
            /* running lagakr phir inspect mein pause lagakr dekho jaha hoga wahi pause ho jayega */

            /*⭐ animation short hand  */
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            /* animation: YaminiKaAnimation 4s ease-out 3s 1 backwards; */
            /* animation: YaminiKaAnimation 3s ease-out 2s 1 forwards; */
            /* fill mode - forward lagane se aage jaakr end mein hi ruk jayega */
            /* backwards lagane se waps aa jayega jaisa tha waisa hi ho jayega */
            animation: YaminiKaAnimation 2s ease-in-out 2s infinite alternate-reverse forwards,
            Yamini2 3s ease-in-out 4s 1 forwards;
        }

        @keyframes YaminiKaAnimation{
            from{
                background-color: rgb(136, 199, 255);
            }
            to{
                transform: translateX(600px);
                /* 800 px door tak animation chalega */
                background-color: rgb(222, 144, 157);
                border-radius: 100px;
            }
        }

        @keyframes Yamini2{
            0%{
                transform: rotate(100deg);
            }
            20%{
                transform: rotate(200deg);
            }
            50%{
                transform: rotate(220deg);
            }
            80%{
                transform: rotate(300deg);
            }
            100%{
                transform: rotate(310deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
Box
        </div>
    </div>
</body>

</html>
