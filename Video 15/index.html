<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        h1 {
            color: navy;
        }
        p {
            color: darkmagenta;
        }
    </style>
</head>
<body>
    <h1 style="background-color: lightpink;">Three ways to add CSS to HTML</h1>
    <!-- this is inline css -->
    <div>
        <ol style="color: green;">
            <li>Inline CSS</li> <p>for styling individual elements but not recommended.</p>
            <li>Internal CSS</li> <p>for styling elements within the same document, used for small tweaks.</p>
            
            <li>External CSS</li> <p>for styling elements across multiple documents, for large projects.</p>
        </ol>
    </div>
</body>
</html>
