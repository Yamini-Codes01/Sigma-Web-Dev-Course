<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object-fit and Object-cover</Object-cover></title>
    <style>
        .container{
            height: 488px;
            width: 466px;
            border: 2px solid black;
            background-color: lightblue;

            background-position: center center;
            background-image: url("https://tse1.mm.bing.net/th/id/OIF.kxzPRFRryMImCEWrIzMB9Q?pid=Api&P=0&h=180");
            /* repeat hoti jab chhoti image ko use karte hain toh */

            background-clip: border-box;
            /* mdn reference pr jakr dekho */
            

            /* background-repeat: no-repeat; */
            /* repeat hatane ke liye  */

            background-repeat: repeat-y;
            /* x direction me repeat hoga bss aise hi y lagane se sirf y mein hoga */

            /* background-position: top right; */
            /* background-position: center center; */

            /* background image lagane se directly image download nhi ho sakti mtlb right click karne se bhi nhi aata */


        }
        img{
            width: 466px;
            height: 488px;

            /* object-fit: cover; */
            /* cover karne ke liye image kahin na kahin se crop ho jayegi */
            
            /* object-fit: cover; */
            /* object-position: top left; */
            /* position lagane ke liye pehle fit cover lagana padega aur jo portion rakhna hai woh likhenge */

            /* object-fit: cover; */
            object-fit: contain;
            object-position: 10px 20px;
            /* object-position: 50% 50%; */

            /* object-fit: contain; */
            /* contain se image ussi mein fit ho jayegi aur jagah jagah par background dikhai dega */

            /* object-fit: fill; */
            /* fill se image stretch hokr fit hogi */

        }
    </style>
</head>
<body>
    <div class="container">
