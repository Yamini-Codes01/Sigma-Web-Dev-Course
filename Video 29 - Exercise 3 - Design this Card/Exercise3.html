<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Design the Card</title>
    <style>
        body {
            background-color: black;
            justify-content: center;
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background-color: rgb(235, 246, 255);
            height: 630px;
            width: 480px;
            /* border-radius: 15px; */
            justify-content: center;
            align-items: center;
            display: flex;
        }

        .box1 {
            position: relative;
            background-color: white;
            border-radius: 8px;
            flex-direction: column;
            /* isse content neeche aayega (new para) */
            height: 600px;
            width: 350px;
            justify-content: center;
            display: flex-start;
            /* isse content upr se  start hoga */
            box-shadow: 0px 1px 5px 1px #c0c0c0;
        }

        img {
            border-radius: 10px;
        }

        .img {
            border-radius: 8px;
            border: 0px;
            margin: 2.5%;
        }

        .span {
            margin: 15px;
            color: rgb(90, 90, 90);
            font-size: 17px;
            font: bold;
        }

        .chatpati {
            padding: 3px;
            /* margin: 10px; */
            border: 1px solid gray;
            border-radius: 20px;
        }

        .baddie {
            padding: 3px;
            margin: 10px;
            border: 1px solid gray;
            border-radius: 20px;
        }

        .heading {
            margin: 14px;
            margin-top: 40px;
            text-align: center;
        }

        .heading h1 {
            text-align: left;
            font-family: Arial, Helvetica, sans-serif;
            text-align: left;
        }

        .heading p {
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(90, 90, 90);
            text-align: left;
        }

        .readmore {
            margin-top: 18px;
            padding: 6px 12px;
            border-radius: 20px;
            color: rgb(0, 140, 254);
            background-color: rgb(214, 241, 252);
            font-size: 16px;
            text-align: center;
            border: 2px solid rgb(214, 241, 255);
            text-shadow: 1px;
            display: inline-block;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- Card.png is a file which contains a card image. Write HTML and CSS code to design this card. -->
    <div class="parent">
        <div class="box">
            <div class="box1">
                <div class="img"><img src="baddie2.jpg" alt="baddie" width="330px" height="250px">
                    <div class="span" style="margin-top: 20px; font-family: Arial, Helvetica, sans-serif; font: bold;">
                        <span class="chatpati">&nbsp;&nbsp;Chatpati&nbsp;&nbsp;</span>
                        <span class="baddie">&nbsp;&nbsp;Baddie&nbsp;&nbsp;</span>
                    </div>
                </div>
                <div class="heading">
                    <h1>Slay Queen</h1>
                    <p>
                        Bold vibes, sharp looks, and unapologetic attitude — this baddie owns the spotlight, turning
                        every glance into pure admiration.
                    </p>
                    <div class="readmore">
                        &nbsp;&nbsp;Read More&nbsp;&nbsp;
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
