<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        body {
            background-color: beige;
        }

        .parent {
            /* Exception: 🐻‍❄️transform filter, or perspective properties can also make an element appear as positioned */
            padding: 43px;
            margin: 34px;
            border: 2px solid indigo;
            /* position: relative; */
            /* transform: translate(0); */
            /* transform lagane se agar hum position bhi nhi lagayenge tab bhi parent ke relative hi allign hoga */
            /* filter: invert(0.1); */
            /* invert lagane se bhi position mil jaati hai pr color invert ho jaata hai agar color invert nhi karna hai toh 0 dalenge */
perspective: 0em;
        }

        * {
            margin: 0;
            padding: 0;
        }

        .box {
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }

        .box1 {
            background-color: lavenderblush;
            position: absolute;
            /* position: sticky; */
            top: 0px;
            /* sticky and top 0 karne se ye chipak jayega aur scroll karenge toh wahi rahega🐸 scroll ni karoge tab toh sahi rahega*/
            width: 100%;
            height: 111px;
            margin: 0;
            padding: 0;
            /* absolute lagane se  */
            /* position: absolute; */
            /* top: 0px; */
            /* top: 0px; lagane se nearest positioned (relative) ensister me lag jayega 
            kyuki yaha parent positioned nhi hai 
            phir ye body ko check karega pr woh bhi nhi hai 
            phir ye html lang ke pass jayega (it is the greatest) aur ussi me lag jayega */

            /* pr jaise hi parent me position lagegi ye ussi ke relative lag jaata hai as shown */
            /* for further explanations comment out the position of the parent */

            /* static se apni hi position pr rahega chahe kuch bhi lagalo*/
            /* top: 40px;
            left: 20px; */
            /* z-index: 1; */
            /* jiska z-index zaada hoga woh box upr rahega */
        }

        .box2 {
            background-color: lavender;
            /* position: relative; */
            /* relative lagane se apni position se chal sakta hai as shown */
            /* top: 40px; */
            /* left: 20px; */
            /* z-index: 2; */
        }

        .box3 {
            background-color: mintcream;
            position: fixed;
            /* fixed karne se hum page chahe scroll karde woh wahi rehta hai like ads  */
            bottom: 0px;
            left: 8vw;
            height: 111px;
        }

        .box4 {
            background-color: lightcyan;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>

</body>

</html>
